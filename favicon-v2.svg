<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Icon-only favicon: centered mark with padding so Google's circular mask never clips it. -->
  <rect width="64" height="64" rx="14" fill="#ffffff"/>
  <g transform="translate(32,32) scale(0.66) translate(-32,-32)">
    <!-- waves -->
    <path d="M6 52 Q 20 48 32 52 T 58 52" stroke="#3B93FF" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M10 56 Q 22 53 32 56 T 54 56" stroke="#0057E0" stroke-width="2.4" fill="none" stroke-linecap="round" opacity=".7"/>
    <!-- warehouse body -->
    <path d="M14 48 L 14 28 L 32 18 L 50 28 L 50 48 Z" fill="#2463C9"/>
    <path d="M14 28 L 32 18 L 50 28 L 32 24 Z" fill="#1F4F9F"/>
    <rect x="26" y="36" width="10" height="12" fill="#0E2E5C"/>
    <rect x="27" y="37" width="8" height="10" fill="none" stroke="#DCE8FA" stroke-width=".7"/>
    <!-- palm trunk -->
    <path d="M44 48 Q 45 38 46 24" stroke="#6B4E2E" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <!-- palm fronds -->
    <g fill="#2E8B3B">
      <path d="M46 22 Q 54 12 60 16 Q 52 18 46 22 Z"/>
      <path d="M46 22 Q 38 12 32 16 Q 40 18 46 22 Z"/>
      <path d="M46 22 Q 56 22 60 30 Q 52 26 46 22 Z"/>
      <path d="M46 22 Q 36 22 32 30 Q 40 26 46 22 Z"/>
      <path d="M46 22 Q 50 14 52 6 Q 48 14 46 22 Z"/>
    </g>
    <circle cx="46" cy="23" r="1.2" fill="#3C6E2A"/>
  </g>
</svg>
